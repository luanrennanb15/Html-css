<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
</head>

<style>
    body{
        font-family: Arial, Helvetica, sans-serif;

    }
    a{
        color: red;
        text-decoration: none;
        font-weight: bold;
    }
    a:visited{
        color: darkred;
    }
    a:hover{
        color: black;
        text-decoration: underline;

    }
    a:active{
        color: yellow;
    }
    a::after {
        content: '[link]';
        text-decoration: none;
        font-weight: normal;
        color: darkgray;
    }
</style>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/luanrennanb15">Repositorio GitHub</a></li>
        <li><a href="https://www.youtube.com/watch?v=vMlrcOVr7po&list=PLHz_AreHm4dlUpEXkY1AyVLQGcpSgVF8s&index=22">Canal do youtbe</a></li>
        <li><a href="https://www.youtube.com/watch?v=vMlrcOVr7po&list=PLHz_AreHm4dlUpEXkY1AyVLQGcpSgVF8s&index=22">Site do cursoemvideo</a></li>
    </ul>
    
</body>
</html>
