<head>

    <title>Fontes com googles fontes</title>

        @import url('https://fonts.googleapis.com/css2?family=Fascinate+Inline&display=swap');
        body{
            font-family: "Fascinate Inline", system-ui;
            font-size: 3em;
            font-weight: 400;
            font-style: normal;
        }
        h1{
            font-family: 'Times New Roman', Times, serif;
            font-size: 3em;
        }
        h2{
            font-family: 'Times New Roman', Times, serif;
            font-size: 2em;
    
        }
    </style>
</head>
<body>

</html>
